<!DOCTYPE html>
<html>
<head>
<title>Baloch 11 - View + Secure Add</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
<style>
*{margin:0; padding:0; box-sizing:border-box;}
body{font-family:Segoe UI; background:url("https://images.unsplash.com/photo-1540747913346-19e32dc3e97e") no-repeat center/cover; min-height:100vh; color:white; text-align:center; position:relative;}
body::before{content:""; position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.65); z-index:-1;}
.header{padding:40px;}
.header h1{font-size:42px; color:#00ff9c; text-shadow:0 0 15px #00ff9c;}
.header p{font-size:18px; opacity:0.9;}
.form{background:rgba(255,255,255,0.08); backdrop-filter:blur(12px); border:1px solid rgba(255,255,255,0.2); width:350px; margin:20px auto; padding:20px; border-radius:18px; box-shadow:0 10px 40px rgba(0,0,0,0.5);}
.form input, .form select, .form button{width:95%; padding:10px; margin:8px; border:none; border-radius:10px; outline:none;}
button{background:linear-gradient(45deg,#00ff9c,#00c3ff); color:black; cursor:pointer; font-weight:bold; margin:5px; transition:0.3s;}
button:hover{transform:scale(1.1); box-shadow:0 0 15px #00ff9c;}
#image{max-width:250px; margin-top:10px; border-radius:10px; display:none;}
#team{display:flex; flex-wrap:wrap; justify-content:center; gap:25px; margin:40px;}
.card{background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.2); backdrop-filter:blur(10px); padding:15px; border-radius:20px; width:180px; box-shadow:0 8px 35px rgba(0,0,0,0.6); transition:0.3s; position:relative;}
.card:hover{transform:translateY(-10px) scale(1.05); box-shadow:0 0 20px #00ff9c;}
.card img{width:95px; height:95px; border-radius:50%; object-fit:cover; border:3px solid #00ff9c; margin-bottom:10px;}
.card h4{margin-bottom:4px;}
.card p{font-size:14px; color:#00ff9c;}
.delete-btn{position:absolute; top:5px; right:5px; background:red; color:white; font-size:12px; padding:3px 6px; border-radius:6px; cursor:pointer; transition:0.3s;}
.delete-btn:hover{background:#ff5252;}
</style>
</head>
<body>

<div class="header">
<h1>🏆 Baloch 11</h1>
<p>APL League Season 4</p>
</div>

<!-- Password input only for authorized users -->
<div style="margin-bottom:20px;">
<input type="password" id="accessPassword" placeholder="Enter Access Password">
<button onclick="checkAccess()">Unlock Form</button>
<p id="errorMsg" style="color:red;"></p>
</div>

<div class="form">
<input type="text" id="name" placeholder="Player Name" disabled>
<select id="type" disabled>
<option>Batsman</option>
<option>Bowler</option>
<option>All-Rounder</option>
<option>Wicketkeeper</option>
</select>
<input type="file" id="photo" disabled>
<br>
<img id="image">
<br>
<button onclick="cropImage()" disabled>Crop</button>
<button onclick="addPlayer()" disabled>Add Player</button>
</div>

<div id="team"></div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getDatabase, ref, push, onValue, query, orderByChild, equalTo, remove } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

// Your Firebase config (same as your project)
const firebaseConfig = {
  apiKey: "AIzaSyDpULIpTjt21ezahEy_kks3Y8NlDSp-x1E",
  authDomain: "team-baloch-11.firebaseapp.com",
  databaseURL: "https://team-baloch-11-default-rtdb.firebaseio.com",
  projectId: "team-baloch-11",
  storageBucket: "team-baloch-11.firebasestorage.app",
  messagingSenderId: "13073184504",
  appId: "1:13073184504:web:ed8ab4d1e572b7afe12d0d"
};

const app = initializeApp(firebaseConfig);

// IMPORTANT — use your exact database URL
const db = getDatabase(app);

let cropper;
let croppedImage = "";
const ACCESS_PASSWORD = "RAZA";

const teamDiv = document.getElementById("team");
const playersRef = ref(db, "players");
const photoInput = document.getElementById("photo");
const imageTag = document.getElementById("image");

// ======= Make functions global so HTML buttons work =======
window.checkAccess = function(){
    let input = document.getElementById("accessPassword").value;
    if(input === ACCESS_PASSWORD){
        enableForm(true);
        document.getElementById("errorMsg").innerText="Form unlocked!";
        document.querySelectorAll("#team .card").forEach(card=>{
            if(!card.querySelector(".delete-btn")){
                const btn = document.createElement("div");
                btn.className = "delete-btn";
                btn.innerText = "X";
                btn.onclick = ()=>deletePlayer(btn);
                card.appendChild(btn);
            }
        });
    } else{
        document.getElementById("errorMsg").innerText="Incorrect password!";
    }
};

function enableForm(state){
    document.getElementById("name").disabled = !state;
    document.getElementById("type").disabled = !state;
    document.getElementById("photo").disabled = !state;
    document.querySelectorAll(".form button").forEach(btn=>btn.disabled=!state);
}

// ======= Image Cropping =======
photoInput.addEventListener("change", function(e){
    let file = e.target.files[0];
    if(!file) return;
    let reader = new FileReader();
    reader.onload = function(event){
        imageTag.src = event.target.result;
        imageTag.style.display = "block";
        if(cropper) cropper.destroy();
        cropper = new Cropper(imageTag, {aspectRatio:1, viewMode:1});
    }
    reader.readAsDataURL(file);
});

window.cropImage = function(){
    if(!cropper) return;
    let canvas = cropper.getCroppedCanvas({width:200, height:200});
    croppedImage = canvas.toDataURL();
    imageTag.style.display="none";
};

// ======= Firebase Functions =======
window.addPlayer = function(){
    let name = document.getElementById("name").value;
    let type = document.getElementById("type").value;
    if(!name || !croppedImage){
        alert("Enter name and crop image first!");
        return;
    }

    push(playersRef, {name, type, image: croppedImage});
    createPlayerCard(name, type, croppedImage, true);

    document.getElementById("name").value = "";
    document.getElementById("type").selectedIndex = 0;
    document.getElementById("photo").value = "";
    croppedImage = "";
    if(cropper) cropper.destroy();
};

function createPlayerCard(name, type, image, showDelete=true){
    let card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `<img src="${image}"><h4>${name}</h4><p>${type}</p>`;
    if(showDelete){
        const btn = document.createElement("div");
        btn.className = "delete-btn";
        btn.innerText = "X";
        btn.onclick = ()=>deletePlayer(btn);
        card.appendChild(btn);
    }
    teamDiv.appendChild(card);
}

function deletePlayer(el){
    const input = prompt("Enter access password to delete this player:");
    if(input === ACCESS_PASSWORD){
        let card = el.parentElement;
        let name = card.querySelector("h4").innerText;
        const q = query(playersRef, orderByChild("name"), equalTo(name));
        onValue(q, snapshot=>{
            snapshot.forEach(child=>remove(child.ref));
        }, {onlyOnce:true});
        card.remove();
    } else alert("Incorrect password!");
}

// ======= Load existing players =======
onValue(playersRef, snapshot => {
    teamDiv.innerHTML = "";
    snapshot.forEach(child=>{
        let player = child.val();
        createPlayerCard(player.name, player.type, player.image, false);
    });
});
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
</body>
</html>
